apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  auth-service-overview.json: |-
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "title": "CPU usage (cores)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{pod=~\"auth-service.*\", container!=\"\"}[5m]))",
              "refId": "A",
              "legendFormat": "cpu cores"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "title": "Memory usage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{pod=~\"auth-service.*\", container!=\"\"})",
              "refId": "A",
              "legendFormat": "memory bytes"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "title": "Pod restarts (CrashLoopBackOff signal)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (pod) (kube_pod_container_status_restarts_total{pod=~\"auth-service.*\"})",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "title": "OOM kills (last 1h)",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(increase(container_oom_events_total{pod=~\"auth-service.*\"}[1h]))",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["sre-platform", "auth-service"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "",
      "title": "auth-service-overview",
      "uid": "auth-service-overview",
      "version": 1,
      "weekStart": ""
    }
