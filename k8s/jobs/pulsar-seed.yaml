# One-shot Job that seeds the standalone Pulsar with demo topics. Idempotent
# — pulsar-admin returns success on `create` for an existing topic.
#
# Apply with:
#   kubectl apply -f k8s/jobs/pulsar-seed.yaml
#   kubectl wait --for=condition=complete job/pulsar-seed --timeout=120s
apiVersion: batch/v1
kind: Job
metadata:
  name: pulsar-seed
  labels:
    app: pulsar-seed
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: pulsar-seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: apachepulsar/pulsar:latest
          env:
            - name: PULSAR_ADMIN_URL
              value: http://pulsar:8080
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "Waiting for pulsar admin API at $PULSAR_ADMIN_URL..."
              for i in $(seq 1 60); do
                if curl -sf "$PULSAR_ADMIN_URL/admin/v2/clusters" >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done

              ADMIN="bin/pulsar-admin --admin-url $PULSAR_ADMIN_URL"

              echo "Creating demo topics in public/default..."
              for topic in incidents.alerts services.events audit.log; do
                if ! $ADMIN topics list public/default 2>/dev/null | grep -q "^persistent://public/default/${topic}$"; then
                  $ADMIN topics create persistent://public/default/${topic}
                  echo "  + persistent://public/default/${topic}"
                else
                  echo "  = persistent://public/default/${topic} (already exists)"
                fi
              done

              echo "Producing sample messages..."
              bin/pulsar-client --url pulsar://pulsar:6650 produce \
                persistent://public/default/incidents.alerts \
                --messages 'api-gateway p99 latency 2.4s;auth-service CrashLoopBackOff' \
                --separator ';' || true
              bin/pulsar-client --url pulsar://pulsar:6650 produce \
                persistent://public/default/services.events \
                --messages 'deploy:api-gateway:rev-22.6.11;deploy:auth-service:rev-22.6.11' \
                --separator ';' || true

              echo "Seed complete. Topics in public/default:"
              $ADMIN topics list public/default
