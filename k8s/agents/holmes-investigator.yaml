apiVersion: v1
kind: ServiceAccount
metadata:
  name: holmes-investigator
---
# Read-only cluster access for HolmesGPT's kubernetes/core + argocd/core
# toolsets. Intentionally excludes secrets — Holmes should never need to
# read credentials to investigate. Adjust resource list as new toolsets
# come online (e.g. add metrics.k8s.io if the metrics toolset is enabled).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: holmes-investigator
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - events
      - nodes
      - namespaces
      - configmaps
      - persistentvolumeclaims
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets", "appprojects"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: holmes-investigator
subjects:
  - kind: ServiceAccount
    name: holmes-investigator
    namespace: default
roleRef:
  kind: ClusterRole
  name: holmes-investigator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: holmes-investigator
  labels:
    app: holmes-investigator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: holmes-investigator
  template:
    metadata:
      labels:
        app: holmes-investigator
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "holmes-investigator"
        dapr.io/app-port: "8000"
        dapr.io/log-level: "debug"
        dapr.io/env-from-secret: "key=sre-agent-secrets:OPENAI_API_KEY"
    spec:
      serviceAccountName: holmes-investigator
      containers:
        - name: holmes-investigator
          image: ${IMAGE_REPO}/holmes-investigator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # HolmesGPT reads MODEL + OPENAI_API_KEY directly via LiteLLM.
            # OPENAI_API_KEY is injected by the Dapr annotation above; MODEL
            # defaults to gpt-4o-mini in app_holmes.py but can be overridden.
            - name: MODEL
              value: "gpt-4o-mini"
            # DaprWorkflowHolmesRunner defaults to a state store named
            # "statestore" (which `dapr init` creates locally). In-cluster
            # we reuse agent-workflow — same MongoDB-backed store used for
            # workflow state, so the event tape shares its failure domain.
            - name: HOLMES_EVENTS_STORE
              value: "agent-workflow"
            # HolmesGPT's argocd/core toolset reads ARGOCD_AUTH_TOKEN. The
            # secret stores the same value under ARGOCD_TOKEN (legacy name
            # from the previous agent fleet), so we alias it here.
            - name: ARGOCD_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sre-agent-secrets
                  key: ARGOCD_TOKEN
          envFrom:
            - secretRef:
                name: sre-agent-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: holmes-investigator
spec:
  selector:
    app: holmes-investigator
  ports:
    - port: 8000
      targetPort: 8000
