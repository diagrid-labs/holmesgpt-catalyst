apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-mcp
  labels:
    app: github-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-mcp
  template:
    metadata:
      labels:
        app: github-mcp
    spec:
      containers:
        - name: github-mcp
          image: ghcr.io/github/github-mcp-server:v1.0.5
          args:
            - --read-only
            - --toolsets=actions,pull_requests,repos
            - http
            - --port=8000
          ports:
            - containerPort: 8000
          env:
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sre-agent-secrets
                  key: GITHUB_TOKEN
---
apiVersion: v1
kind: Service
metadata:
  name: github-mcp
spec:
  selector:
    app: github-mcp
  ports:
    - port: 8000
      targetPort: 8000
