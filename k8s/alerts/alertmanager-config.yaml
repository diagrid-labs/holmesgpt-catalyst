# Alertmanager configuration. Slack webhook URL is read from the
# alertmanager-slack-webhook Secret via $SLACK_WEBHOOK_URL env var.
# Apply: kubectl apply -f k8s/alerts/alertmanager-slack-secret.yaml -f k8s/alerts/alertmanager-config.yaml
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-kube-prometheus-stack-alertmanager
  namespace: monitoring
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 1m
      slack_api_url: '${SLACK_WEBHOOK_URL}'

    inhibit_rules:
      - equal: [namespace, alertname]
        source_matchers: [severity = critical]
        target_matchers: [severity =~ "warning|info"]
      - equal: [namespace, alertname]
        source_matchers: [severity = warning]
        target_matchers: [severity = info]
      - equal: [namespace]
        source_matchers: [alertname = InfoInhibitor]
        target_matchers: [severity = info]
      - target_matchers: [alertname = InfoInhibitor]

    route:
      receiver: "null"
      group_by: [alertname, namespace, pod]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - matchers: [alertname = "KubePodCrashLooping"]
          receiver: slack-notifications

    receivers:
      - name: "null"

      - name: slack-notifications
        slack_configs:
          - channel: '#holmes-gpt-alerts'
            send_resolved: true
            title: '{{ if eq .Status "firing" }}:fire:{{ else }}:white_check_mark:{{ end }} {{ .GroupLabels.alertname }} ({{ .Status | toUpper }})'
            text: |
              {{ range .Alerts }}
              *Summary:* {{ .Annotations.summary }}
              *Namespace:* {{ .Labels.namespace }}{{ if .Labels.pod }}  *Pod:* {{ .Labels.pod }}{{ end }}
              *Severity:* {{ .Labels.severity }}
              {{ if .Annotations.description }}*Details:* {{ .Annotations.description }}{{ end }}
              :robot_face: *Investigate with the SRE Agent:* http://20.126.199.3  — ask _"{{ .Labels.pod }} pods are in CrashLoopBackOff. How do I triage?"_
              {{ end }}

    templates:
      - /etc/alertmanager/config/*.tmpl
