# yugabyte overrides for the per-release (Makefile) install.
# 10Gi: YB's disk-full guard rejects writes when free space is under ~1GiB.
replicas:
  master: 1
  tserver: 1
storage:
  master:
    size: 10Gi
  tserver:
    size: 10Gi
resource:
  master:
    requests: {cpu: 0.5, memory: 1Gi}
  tserver:
    requests: {cpu: 0.5, memory: 1Gi}
