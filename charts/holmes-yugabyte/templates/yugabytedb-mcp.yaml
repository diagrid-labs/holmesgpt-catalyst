apiVersion: apps/v1
kind: Deployment
metadata:
  name: yugabytedb-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "holmes-sre.labels" . | nindent 4 }}
    app: yugabytedb-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yugabytedb-mcp
  template:
    metadata:
      labels:
        app: yugabytedb-mcp
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: yugabytedb-mcp
          image: {{ .Values.image | quote }}
          imagePullPolicy: Always
          args: ["--transport=http", "--stateless-http"]
          ports:
            - containerPort: 8000
          env:
            - name: YUGABYTEDB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: YUGABYTEDB_URL
            - name: YB_MCP_TRANSPORT
              value: "http"
            - name: YB_MCP_STATELESS_HTTP
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: yugabytedb-mcp
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: yugabytedb-mcp
  ports:
    - port: 8000
      targetPort: 8000
