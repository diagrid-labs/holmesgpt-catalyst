apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "holmes-sre.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "holmes-sre.labels" . | nindent 4 }}
---
# Read-only cluster access for HolmesGPT's kubernetes/core + argocd/core
# toolsets. Intentionally excludes secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "holmes-sre.name" . }}-{{ .Release.Namespace }}
  labels:
    {{- include "holmes-sre.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, services, endpoints, events, nodes, namespaces, configmaps, persistentvolumeclaims, serviceaccounts]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets, daemonsets]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses, networkpolicies]
    verbs: [get, list, watch]
  - apiGroups: [argoproj.io]
    resources: [applications, applicationsets, appprojects]
    verbs: [get, list, watch]
  - apiGroups: [metrics.k8s.io]
    resources: [pods, nodes]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "holmes-sre.name" . }}-{{ .Release.Namespace }}
  labels:
    {{- include "holmes-sre.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "holmes-sre.name" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "holmes-sre.name" . }}-{{ .Release.Namespace }}
  apiGroup: rbac.authorization.k8s.io
