apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "holmes-sre.name" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "holmes-sre.labels" . | nindent 4 }}
data:
  holmes_config.yaml: |
    # Rendered by the holmes-sre Helm chart — toolsets/MCP servers below are
    # gated by chart values. Mounted over /app/holmes_config.yaml in the image.
    toolsets:
    {{- if .Values.toolsets.kubernetes }}
      kubernetes/core:
        enabled: true
    {{- end }}
    {{- if .Values.toolsets.argocd.enabled }}
      argocd/core:
        enabled: true
      bash:
        config:
          allow:
            - "argocd app get"
            - "argocd app list"
            - "argocd app diff"
            - "argocd app history"
            - "argocd app manifests"
    {{- end }}
    {{- if .Values.toolsets.prometheus.enabled }}
      prometheus/metrics:
        enabled: true
        subtype: prometheus
        config:
          prometheus_url: {{ include "holmes-sre.prometheusUrl" . }}
    {{- end }}
    {{- if or .Values.mcp.github.enabled .Values.mcp.yugabytedb.enabled .Values.mcp.pulsar.enabled }}
    mcp_servers:
    {{- if .Values.mcp.github.enabled }}
      github:
        description: "GitHub MCP server — repos, PRs, workflows, commits"
        config:
          url: "http://github-mcp:8000/mcp"
          mode: "streamable-http"
          extra_headers:
            Authorization: "Bearer {{ "{{" }} env.GITHUB_TOKEN {{ "}}" }}"
    {{- end }}
    {{- if .Values.mcp.yugabytedb.enabled }}
      yugabytedb:
        description: "YugabyteDB MCP server — list tables, run read-only SQL queries"
        config:
          url: "http://yugabytedb-mcp:8000/mcp"
          mode: "streamable-http"
    {{- end }}
    {{- if .Values.mcp.pulsar.enabled }}
      snmcp:
        description: "StreamNative MCP server — Apache Pulsar topics, namespaces, tenants"
        config:
          url: "http://snmcp:9090/mcp"
          mode: "sse"
    {{- end }}
    {{- end }}
    custom_skill_paths:
      - ./skills
