# holmes-app — the investigator (its own Helm release).
# Independently upgradable: `helm upgrade holmes-app charts/holmes-app -n <ns>`.

nodeSelector:
  agentpool: control

investigator:
  image:
    repo: docker.io/tezizzm/holmes-investigator
    tag: latest
    pullPolicy: Always
  replicas: 1
  model: gpt-4o-mini
  eventsStore: agent-workflow
  service:
    type: LoadBalancer
    port: 80
    dnsLabel: demo-holmes-investigator

catalyst:
  grpcEndpoint: "https://grpc-prj6342098.3jsqkq3nmjg2jxixwk5z3dbjrszhrhvg.r1.privatediagrid.net:443"
  httpEndpoint: "https://http-prj6342098.3jsqkq3nmjg2jxixwk5z3dbjrszhrhvg.r1.privatediagrid.net:443"

secret:
  name: sre-agent-secrets
  create: false
  data: {}

# Toolset wiring written into holmes_config.yaml (the mounted ConfigMap).
toolsets:
  kubernetes: true
  prometheus:
    enabled: true
    # Multi-namespace standalone: set this to the monitoring-ns Prometheus, e.g.
    #   http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
    # "" => computed from the release (correct for the single-namespace umbrella).
    url: ""
  argocd:
    enabled: true
    # host:port, no scheme. "" => computed from the release.
    server: ""
    opts: "--grpc-web --insecure"

# Which MCP server URLs to list in holmes_config. These are the *clients* —
# the servers themselves are deployed by the holmes-mcp chart. Keep in sync
# (or leave all true: a missing server just degrades that toolset gracefully).
mcp:
  github:
    enabled: true
  yugabytedb:
    enabled: true
  pulsar:
    enabled: true

# Demo scaffolding the investigator observes (managed alongside the app).
targetApps:
  enabled: true
  namespace: production
grafanaDashboards: true
