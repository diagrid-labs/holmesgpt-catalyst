# holmes-mcp — MCP servers + Pulsar + seed jobs (its own Helm release).
# Independently upgradable: `helm upgrade holmes-mcp charts/holmes-mcp -n <ns>`.

nodeSelector:
  agentpool: control

# Reuses the same secret the app uses (GITHUB_TOKEN, YUGABYTEDB_URL, etc.).
secret:
  name: sre-agent-secrets

mcp:
  github:
    enabled: true
    image: ghcr.io/github/github-mcp-server:latest
    toolsets: "actions,pull_requests,repos"
  yugabytedb:
    enabled: true
    image: docker.io/tezizzm/yugabytedb-mcp:latest
  pulsar:
    enabled: true
    snmcpImage: streamnative/snmcp:latest
    pulsarImage: apachepulsar/pulsar:3.3.7

# One-shot seed Jobs (post-install/upgrade hooks). yugabytedb seed connects to
# yb-tserver-0.yb-tservers in this namespace; pulsar seed targets the Pulsar above.
seed:
  yugabytedb: true
  pulsar: true
