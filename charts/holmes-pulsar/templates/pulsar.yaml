apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsar
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "holmes-sre.labels" . | nindent 4 }}
    app: pulsar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulsar
  template:
    metadata:
      labels:
        app: pulsar
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pulsar
          image: {{ .Values.pulsarImage | quote }}
          command: [bin/pulsar, standalone, --no-functions-worker, --no-stream-storage]
          env:
            - name: PULSAR_MEM
              value: "-Xms1500m -Xmx1500m -XX:MaxDirectMemorySize=1g"
          ports:
            - {name: pulsar, containerPort: 6650}
            - {name: admin-http, containerPort: 8080}
          readinessProbe:
            httpGet: {path: /admin/v2/clusters, port: 8080}
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests: {cpu: 500m, memory: 2Gi}
            limits: {memory: 4Gi}
---
apiVersion: v1
kind: Service
metadata:
  name: pulsar
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: pulsar
  ports:
    - {name: pulsar, port: 6650, targetPort: 6650}
    - {name: admin-http, port: 8080, targetPort: 8080}
