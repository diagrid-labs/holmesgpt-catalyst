{{- if .Values.seed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: pulsar-seed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "holmes-sre.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: pulsar-seed
    spec:
      restartPolicy: OnFailure
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: seed
          image: {{ .Values.pulsarImage | quote }}
          env:
            - name: PULSAR_ADMIN_URL
              value: http://pulsar:8080
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              for i in $(seq 1 90); do
                if curl -sf "$PULSAR_ADMIN_URL/admin/v2/clusters" >/dev/null 2>&1; then break; fi
                sleep 2
              done
              ADMIN="bin/pulsar-admin --admin-url $PULSAR_ADMIN_URL"
              for topic in incidents.alerts services.events audit.log; do
                $ADMIN topics create persistent://public/default/${topic} 2>/dev/null || true
              done
              bin/pulsar-client --url pulsar://pulsar:6650 produce persistent://public/default/incidents.alerts \
                --messages 'api-gateway p99 latency 2.4s;auth-service CrashLoopBackOff' --separator ';' || true
              echo "Seed complete."
{{- end }}
