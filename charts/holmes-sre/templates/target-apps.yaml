{{- if .Values.targetApps.enabled }}
{{- /* nginx stand-ins for Holmes to investigate, managed by the ArgoCD that
       this release installs (Applications live in the release namespace). */ -}}
{{- range $name := list "api-gateway" "auth-service" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "holmes-sre.labels" $ | nindent 4 }}
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: nginx
    targetRevision: 22.6.11
    helm:
      parameters:
        - name: replicaCount
          value: "1"
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $.Values.targetApps.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
{{- end }}
{{- end }}
