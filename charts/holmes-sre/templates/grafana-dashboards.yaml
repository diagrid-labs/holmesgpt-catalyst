{{- if .Values.grafanaDashboards }}
{{- /* One ConfigMap per JSON in files/dashboards/. The kube-prometheus-stack
       grafana sidecar auto-imports ConfigMaps labeled grafana_dashboard=1.
       .Files.Get injects the JSON verbatim (no Helm templating of {{ }} legends). */ -}}
{{- range $path, $_ := .Files.Glob "files/dashboards/*.json" }}
{{- $name := base $path | trimSuffix ".json" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-dashboard
  namespace: {{ $.Release.Namespace }}
  labels:
    grafana_dashboard: "1"
    {{- include "holmes-sre.labels" $ | nindent 4 }}
data:
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
---
{{- end }}
{{- end }}
