# Umbrella values. Subchart values are namespaced by chart name. Most app/mcp
# defaults live in the component charts; override per-deploy here or via --set.
#
# Single release in one namespace — the argo-cd/prometheus subchart service
# names get the release-name prefix, which the holmes-app config helper already
# accounts for. (The Makefile / per-release path uses unprefixed names instead.)

holmes-app:
  catalyst:
    grpcEndpoint: "https://grpc-prj6342098.3jsqkq3nmjg2jxixwk5z3dbjrszhrhvg.r1.privatediagrid.net:443"
    httpEndpoint: "https://http-prj6342098.3jsqkq3nmjg2jxixwk5z3dbjrszhrhvg.r1.privatediagrid.net:443"
  # leave toolsets.prometheus.url / argocd.server empty => computed from the
  # umbrella release name (correct for the single-release subchart layout).

holmes-mcp: {}

# ── Infra subcharts (set enabled=false to skip ones you already run) ──────────
argo-cd:
  enabled: true
  applicationSet:
    enabled: true
  global:
    nodeSelector:
      agentpool: control

kube-prometheus-stack:
  enabled: true
  prometheus:
    prometheusSpec:
      nodeSelector:
        agentpool: control
  grafana:
    nodeSelector:
      agentpool: control
  prometheusOperator:
    nodeSelector:
      agentpool: control
  alertmanager:
    alertmanagerSpec:
      nodeSelector:
        agentpool: control

yugabyte:
  enabled: true
  replicas:
    master: 1
    tserver: 1
  storage:           # 10Gi — YB's disk-full guard rejects writes under ~1GiB free
    master:
      size: 10Gi
    tserver:
      size: 10Gi
  resource:
    master:
      requests: {cpu: 0.5, memory: 1Gi}
    tserver:
      requests: {cpu: 0.5, memory: 1Gi}
  nodeSelector:
    agentpool: control
