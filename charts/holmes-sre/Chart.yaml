apiVersion: v2
name: holmes-sre
description: Umbrella that brings up the whole SRE Investigator demo in one release
type: application
version: 0.2.0
appVersion: "0.1.0"

# Greenfield "one release" path. Depends on the component charts (so there's a
# single copy of every template — the same charts the Makefile installs as
# independent releases) plus the heavy infra as optional subcharts.
#
# NOTE: an umbrella installs every subchart into the release namespace.
# For independent per-component upgrades, use the Makefile (separate releases)
# instead of this umbrella — see the repo Makefile / charts README.
dependencies:
  - name: holmes-app
    version: "0.1.0"
    repository: "file://../holmes-app"
  - name: holmes-mcp
    version: "0.1.0"
    repository: "file://../holmes-mcp"
  - name: argo-cd
    version: "7.*"
    repository: https://argoproj.github.io/argo-helm
    condition: argo-cd.enabled
  - name: kube-prometheus-stack
    version: "65.*"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-prometheus-stack.enabled
  - name: yugabyte
    version: "2.*"
    repository: https://charts.yugabyte.com
    condition: yugabyte.enabled
