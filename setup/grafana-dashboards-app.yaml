---
# ArgoCD Application that syncs the Grafana dashboard ConfigMaps
# from the public sre-platform-services fork into the monitoring namespace.
# kube-prometheus-stack's Grafana sidecar auto-imports any ConfigMap labeled grafana_dashboard=1.
#
# Apply with: envsubst < setup/grafana-dashboards-app.yaml | kubectl apply -f -
#
# Prerequisites:
#   - GITHUB_OWNER environment variable set (e.g. export GITHUB_OWNER=tezizzm)
#   - The sre-platform-services fork is public so ArgoCD can read it without credentials
#   - kube-prometheus-stack installed in the monitoring namespace (step 6)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/${GITHUB_OWNER}/sre-platform-services
    path: platform/grafana-dashboards
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
