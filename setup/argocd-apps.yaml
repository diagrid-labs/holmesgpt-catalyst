---
# Sample ArgoCD applications representing the platform services.
# These deploy nginx as a stand-in so ArgoCD can report real health and sync status.
# Apply with: kubectl apply -f setup/argocd-apps.yaml
#
# Prerequisites:
#   - ArgoCD installed in the argocd namespace
#   - production namespace created: kubectl create namespace production

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: nginx
    targetRevision: 22.6.11
    helm:
      parameters:
        - name: replicaCount
          value: "1"
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: nginx
    targetRevision: 22.6.11
    helm:
      parameters:
        - name: replicaCount
          value: "1"
        - name: resources.limits.memory
          value: "5Mi"
        - name: resources.requests.memory
          value: "5Mi"
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Demo scenario #2 — bad image tag from a deploy. The pods can never pull the
# image and stay in ImagePullBackOff; the ONLY fault is the nonexistent tag, so
# the root cause is unambiguous and deterministic (good for a reliable demo).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: checkout-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: nginx
    targetRevision: 22.6.11
    helm:
      parameters:
        - name: replicaCount
          value: "1"
        - name: image.tag
          value: "1.0.0-does-not-exist"
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
